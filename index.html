<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP Nexus | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center text-white">

    <div class="glass p-12 rounded-3xl shadow-2xl text-center max-w-md w-full mx-4 transition-all hover:scale-[1.01]">
        <h1 class="text-5xl font-bold tracking-tighter mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            CP Nexus
        </h1>
        <p class="text-slate-400 mb-8 font-light italic">The core of your digital landscape.</p>

        <div class="space-y-4">
            <a href="privacy.html" class="block w-full py-3 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all font-medium hover:text-blue-400">
                Privacy Policy
            </a>
            <a href="terms.html" class="block w-full py-3 px-6 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all font-medium hover:text-emerald-400">
                Terms of Service
            </a>
        </div>

        <div class="mt-12 text-xs text-slate-500 uppercase tracking-widest">
            &copy; 2026 CP Nexus Secure Systems
        </div>
    </div>

</body>
</html>
